     Remplace VOTRE_URL_RENDER par ton URL Render réelle
───────────────────────────────────────────────────────── -->

<style>
  /* ── Widget container ── */
  #chat-widget {
    position: fixed;
    bottom: 32px;
    right: 32px;
    z-index: 9998;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
    font-family: var(--sans);
  }

  /* ── Toggle button ── */
  #chat-toggle {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--gold);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 24px rgba(201,169,110,0.2);
    transition: box-shadow 0.3s, transform 0.3s var(--ease-expo);
    position: relative;
  }
  #chat-toggle:hover {
    box-shadow: 0 0 36px rgba(201,169,110,0.4);
    transform: scale(1.06);
  }
  /* SB avatar */
  #chat-toggle .sb-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--gold-dim);
    border: 1px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.05em;
    transition: background 0.3s;
  }
  #chat-toggle:hover .sb-avatar {
    background: rgba(201,169,110,0.22);
  }
  /* Notification dot */
  #chat-toggle .notif-dot {
    position: absolute;
    top: 4px; right: 4px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--bg);
    animation: pulseDot 2s ease-in-out infinite;
  }
  @keyframes pulseDot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.6; }
  }

  /* ── Chat panel ── */
  #chat-panel {
    width: 360px;
    max-height: 520px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform-origin: bottom right;
    transform: scale(0.85) translateY(16px);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.4s var(--ease-expo), opacity 0.3s;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }
  #chat-panel.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* ── Header ── */
  .chat-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .chat-header-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--gold-dim);
    border: 1px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 0.75rem;
    color: var(--gold);
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .chat-header-info { flex: 1; }
  .chat-header-name {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--white);
    line-height: 1.2;
  }
  .chat-header-status {
    font-size: 0.65rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .chat-header-status::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gold);
    display: inline-block;
  }
  .chat-close {
    background: none;
    border: none;
    color: var(--grey-mid);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    line-height: 1;
    transition: color 0.2s;
  }
  .chat-close:hover { color: var(--white); }

  /* ── Messages area ── */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #chat-messages::-webkit-scrollbar { width: 4px; }
  #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Message bubbles ── */
  .msg {
    max-width: 82%;
    font-size: 0.85rem;
    line-height: 1.6;
    animation: msgIn 0.35s var(--ease-expo);
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 2px;
  }
  .msg.bot .msg-bubble {
    background: var(--bg);
    border: 1px solid var(--border);
    color: rgba(245,240,232,0.85);
    border-bottom-left-radius: 0;
  }
  .msg.user .msg-bubble {
    background: var(--gold-dim);
    border: 1px solid rgba(201,169,110,0.3);
    color: var(--white);
    border-bottom-right-radius: 0;
  }
  .msg-sender {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--grey-mid);
    margin-bottom: 4px;
  }
  .msg.user .msg-sender { text-align: right; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    width: fit-content;
    border-bottom-left-radius: 0;
    border-radius: 2px;
    align-self: flex-start;
    animation: msgIn 0.35s var(--ease-expo);
  }
  .typing-indicator span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.4;
    animation: typingDot 1.2s ease-in-out infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingDot {
    0%, 100% { opacity: 0.4; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-4px); }
  }

  /* Suggested questions */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .suggestion-btn {
    font-size: 0.7rem;
    color: var(--gold);
    border: 1px solid var(--gold-dim);
    background: transparent;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s, border-color 0.2s;
    font-family: var(--sans);
  }
  .suggestion-btn:hover {
    background: var(--gold-dim);
    border-color: var(--gold);
  }

  /* ── Input area ── */
  .chat-input-area {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #chat-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: var(--sans);
    font-size: 0.85rem;
    padding: 10px 14px;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 80px;
    overflow-y: auto;
    transition: border-color 0.2s;
    border-radius: 0;
  }
  #chat-input::placeholder { color: var(--grey-mid); }
  #chat-input:focus { border-color: rgba(201,169,110,0.4); }

  #chat-send {
    width: 38px; height: 38px;
    background: var(--gold);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--bg);
    font-size: 16px;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.2s var(--ease-expo);
  }
  #chat-send:hover { opacity: 0.85; transform: scale(1.05); }
  #chat-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── Mobile adjustments ── */
  @media (max-width: 900px) {
    #chat-widget { bottom: 80px; right: 16px; }
    #chat-panel { width: calc(100vw - 32px); max-width: 360px; }
  }
</style>

<!-- Widget HTML -->
<div id="chat-widget">
  <div id="chat-panel">
    <div class="chat-header">
      <div class="chat-header-avatar">SB</div>
      <div class="chat-header-info">
        <div class="chat-header-name">Sami Bennane</div>
        <div class="chat-header-status">AI Assistant</div>
      </div>
      <button class="chat-close" id="chat-close-btn" aria-label="Close chat">
        <i class="ph ph-x"></i>
      </button>
    </div>

    <div id="chat-messages"></div>

    <div class="chat-input-area">
      <textarea
        id="chat-input"
        placeholder="Ask me anything about Sami..."
        rows="1"
        maxlength="500"
        aria-label="Your message"
      ></textarea>
      <button id="chat-send" aria-label="Send">
        <i class="ph ph-paper-plane-tilt"></i>
      </button>
    </div>
  </div>

  <button id="chat-toggle" aria-label="Open chat">
    <div class="sb-avatar">SB</div>
    <div class="notif-dot" id="notif-dot"></div>
  </button>
</div>

<script>
(function () {
  // ── Config ───────────────────────────────────────────
  // 🔴 Remplace par ton URL Render après déploiement
  const API_URL = "https://VOTRE_URL_RENDER.onrender.com/ask";

  const WELCOME_MSG = "Hi! I'm Sami's AI assistant. Ask me anything about his background, projects, or skills.";
  const WELCOME_MSG_FR = "Bonjour ! Je suis l'assistant IA de Sami. Posez-moi des questions sur son parcours, ses projets ou ses compétences.";

  const SUGGESTIONS = [
    "What are his main skills?",
    "Tell me about his projects",
    "Where is he studying?",
    "Is he open to internships?",
  ];

  // ── State ────────────────────────────────────────────
  let isOpen = false;
  let isLoading = false;
  let welcomeShown = false;

  // ── DOM refs ─────────────────────────────────────────
  const panel      = document.getElementById("chat-panel");
  const toggle     = document.getElementById("chat-toggle");
  const closeBtn   = document.getElementById("chat-close-btn");
  const messages   = document.getElementById("chat-messages");
  const input      = document.getElementById("chat-input");
  const sendBtn    = document.getElementById("chat-send");
  const notifDot   = document.getElementById("notif-dot");

  // ── Toggle panel ─────────────────────────────────────
  toggle.addEventListener("click", () => {
    isOpen = !isOpen;
    panel.classList.toggle("open", isOpen);
    if (isOpen) {
      notifDot.style.display = "none";
      if (!welcomeShown) showWelcome();
      setTimeout(() => input.focus(), 400);
    }
  });

  closeBtn.addEventListener("click", () => {
    isOpen = false;
    panel.classList.remove("open");
  });

  // ── Welcome message ───────────────────────────────────
  function showWelcome() {
    welcomeShown = true;
    addBotMessage(WELCOME_MSG, SUGGESTIONS);
  }

  // ── Add messages ──────────────────────────────────────
  function addBotMessage(text, suggestions = []) {
    const wrapper = document.createElement("div");
    wrapper.className = "msg bot";

    const sender = document.createElement("div");
    sender.className = "msg-sender";
    sender.textContent = "Sami's Bot";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = text;

    wrapper.appendChild(sender);
    wrapper.appendChild(bubble);

    if (suggestions.length > 0) {
      const suggestionsEl = document.createElement("div");
      suggestionsEl.className = "suggestions";
      suggestions.forEach(s => {
        const btn = document.createElement("button");
        btn.className = "suggestion-btn";
        btn.textContent = s;
        btn.addEventListener("click", () => {
          if (isLoading) return;
          sendMessage(s);
          suggestionsEl.remove();
        });
        suggestionsEl.appendChild(btn);
      });
      wrapper.appendChild(suggestionsEl);
    }

    messages.appendChild(wrapper);
    scrollToBottom();
  }

  function addUserMessage(text) {
    const wrapper = document.createElement("div");
    wrapper.className = "msg user";

    const sender = document.createElement("div");
    sender.className = "msg-sender";
    sender.textContent = "You";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = text;

    wrapper.appendChild(sender);
    wrapper.appendChild(bubble);
    messages.appendChild(wrapper);
    scrollToBottom();
  }

  function showTyping() {
    const el = document.createElement("div");
    el.className = "typing-indicator";
    el.id = "typing";
    el.innerHTML = "<span></span><span></span><span></span>";
    messages.appendChild(el);
    scrollToBottom();
    return el;
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  function scrollToBottom() {
    messages.scrollTop = messages.scrollHeight;
  }

  // ── Send message ──────────────────────────────────────
  async function sendMessage(text) {
    const question = text || input.value.trim();
    if (!question || isLoading) return;

    input.value = "";
    input.style.height = "auto";
    isLoading = true;
    sendBtn.disabled = true;

    addUserMessage(question);
    const typingEl = showTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });

      removeTyping();

      if (!res.ok) {
        throw new Error(`Server error ${res.status}`);
      }

      const data = await res.json();
      addBotMessage(data.answer || "I couldn't find an answer to that.");

    } catch (err) {
      removeTyping();
      addBotMessage(
        "Sorry, I'm having trouble connecting right now. Please try again later or contact Sami directly at sami.bennane@gmail.com"
      );
      console.error("Chat error:", err);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  // ── Input handlers ────────────────────────────────────
  sendBtn.addEventListener("click", () => sendMessage());

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 80) + "px";
  });

  // ── Show notif dot after 3s if not opened ─────────────
  setTimeout(() => {
    if (!isOpen) notifDot.style.display = "block";
  }, 3000);
})();
</script>
